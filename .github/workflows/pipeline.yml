name: Weather Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repository (IMPORTANT: no persist-credentials false)
      - name: Checkout repository
        uses: actions/checkout@v3

      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # ✅ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Run pipeline
      - name: Run pipeline
        run: python -m src.pipeline

      # ✅ Generate map
      - name: Generate station map
        run: python plot_stations_map.py

      # ✅ Commit updated map
      - name: Commit updated map
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -f station_map.html
          git commit -m "Update station map" || echo "No changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main