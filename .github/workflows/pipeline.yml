name: Weather Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt


      # ✅ Run pipeline
      - name: Run pipeline
        run: python -m src.pipeline

      # ✅ 🔥 ADD THIS (missing in your run)
      - name: Generate station map
        run: python plot_stations_map.py
      
      
      - name: Upload SQLite DB
        uses: actions/upload-artifact@v4
        with:
          name: weather-db
          path: data/weather.db


      # ✅ 🔥 ADD THIS (missing in your run)
      - name: Commit updated map
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -f station_map.html
          git commit -m "Update station map" || echo "No changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
